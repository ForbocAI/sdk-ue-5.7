name: Sync demo submodule

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ForbocAI/demo-ue-5.7
          token: ${{ secrets.DEMO_SYNC_TOKEN }}
          submodules: true

      - name: Update SDK submodule and push
        run: |
          git submodule update --remote Plugins/ForbocAI_SDK
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Plugins/ForbocAI_SDK
          git diff --cached --quiet && echo "Already up to date." && exit 0
          git commit -m "chore: update SDK submodule to latest"
          git push
